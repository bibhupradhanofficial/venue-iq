<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="side-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d7ff" />
      <stop offset="100%" stop-color="#0099ff" />
    </linearGradient>
    <linearGradient id="side-lime" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a3ff00" />
      <stop offset="100%" stop-color="#00ff00" />
    </linearGradient>
    <filter id="sharp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="black" flood-opacity="0.35" />
    </filter>
  </defs>

  {/* Background Hexagon */}
  <path 
    d="M50 5L90 25V75L50 95L10 75V25L50 5Z" 
    fill="#00d7ff" 
    fill-opacity="0.05"
    stroke="#00d7ff"
    stroke-width="0.5"
    stroke-opacity="0.2"
  />

  {/* Left V Beam */}
  <g filter="url(#sharp-shadow)">
    <path d="M22 24L48 84H55L55 42L22 24Z" fill="url(#side-cyan)" />
    <path d="M22 24L55 42V45L25 28L22 24Z" fill="white" fill-opacity="0.3" />
  </g>

  {/* Right V Beam */}
  <g filter="url(#sharp-shadow)">
    <path d="M78 24L52 84H45L45 42L78 24Z" fill="url(#side-lime)" />
    <path d="M78 24L45 42V45L75 28L78 24Z" fill="white" fill-opacity="0.3" />
  </g>

  {/* IQ Jewel Core */}
  <g filter="url(#sharp-shadow)">
    <path d="M50 28L64 42L50 56L36 42L50 28Z" fill="white" />
    <circle cx="50" cy="42" r="3" fill="#00d7ff" />
  </g>

  {/* Precision Accents */}
  <circle cx="22" cy="24" r="3" fill="white" />
  <circle cx="78" cy="24" r="3" fill="white" />
  <circle cx="50" cy="84" r="4" fill="white" />
</svg>
